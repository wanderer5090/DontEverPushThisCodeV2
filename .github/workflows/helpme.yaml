name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: Declare workflow permissions.
# Scope permissions per-workflow (not repo-wide) to follow the principle of least privilege.
# Each workflow only gets the minimum access it needs, reducing blast radius if a token is compromised.
permissions:
  contents: read
  security-events: write   # TODO#0a: required to upload SARIF to GitHub Security tab
  issues: write            # TODO#0b: so Gitleaks/Sonar can comment on PRs + issues
  pull-requests: write     # TODO#0b: so Gitleaks/Sonar can comment on PRs + issues
  id-token: write          # TODO#0c: for OIDC token (used by cloud auth, e.g. AWS/GCP)
  actions: read            # required by some scanners to read workflow context

jobs:
    # GATE#0: Secret scanning (TruffleHog + Gitleaks)
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                # TODO#1: Secret scanners need full git history so they can diff every commit,
                # not just the latest snapshot. Without history, TruffleHog cannot compare
                # base..HEAD and will miss secrets that were introduced and removed in older commits.
                fetch-depth: 0

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                # TODO#2: Set base + HEAD so TruffleHog diffs only the commits in this push/PR.
                # Without this, it scans the entire repo history on every run (slow & noisy).
                base: ${{ github.event.repository.default_branch }}
                head: HEAD
                # TODO#3: --only-verified tells TruffleHog to report only secrets it can
                # actively confirm are valid (e.g. by making an API call). This dramatically
                # reduces false positives — unverified pattern matches are suppressed.
                extra_args: --only-verified

            # TODO#4: Gitleaks step
            # Difference from TruffleHog:
            #   TruffleHog: validates secrets live → fewer false positives, but may MISS secrets
            #               for services it doesn't know how to verify.
            #   Gitleaks:   regex pattern matching → catches more patterns but higher false positives
            #               for patterns that look like secrets but aren't real credentials.
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    # GATE#1a: SAST via SonarQube
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                # TODO#5: SonarQube needs full git history for blame analysis (who changed what line)
                # and new-code detection (only alert on issues introduced in this PR, not old debt).
                fetch-depth: 0

            # TODO#6: SonarQube findings appear in the SonarCloud dashboard, NOT the GitHub Security tab.
            # Why? Because SonarQube uses its own proprietary issue format, not the SARIF standard.
            # GitHub Security tab only accepts SARIF (Static Analysis Results Interchange Format).
            # SonarQube would need a separate SARIF export step to appear in GitHub Security.
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                # TODO#7: Next.js / React is written in JavaScript/TypeScript.
                # Both Next.js API routes and React components compile down to JavaScript,
                # so the correct CodeQL language identifier is 'javascript' (covers TS too).
                language: [ 'javascript' ]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                # TODO#8: Use BOTH suites:
                # - security-extended: covers OWASP Top 10 / CWE Top 25 vulnerabilities
                # - security-and-quality: includes everything in security-extended PLUS
                #   maintainability rules (dead code, poor error handling, code smells).
                # Using both = broadest coverage. security-extended alone misses quality
                # issues that can become security issues (e.g. unhandled exceptions leaking info).
                queries: security-extended,security-and-quality

            # TODO#9: The category field namespaces this run in the Security tab.
            # Without unique categories, two matrix languages (e.g. javascript + python)
            # would overwrite each other's results — only the last one to finish would show.
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check (SARIF + HTML)
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10: Set up Node 20
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11: Install npm dependencies so Dependency-Check can resolve the full
            # dependency tree (including transitive deps). Without node_modules present,
            # Dependency-Check may miss indirect vulnerabilities.
            - name: Install dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                # TODO#12: SARIF format integrates with GitHub Security tab.
                # HTML is human-readable but GitHub cannot parse it for the Security tab.
                format: 'SARIF'
                out: 'reports'
                args: >
                    --failOnCVSS 7
                    --enableRetired

            # TODO#14: Upload Depcheck SARIF to GitHub Security tab
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            # TODO#15: Upload raw Depcheck report as artifact
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy (SARIF + artifact)
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16: Build the Docker image
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                # TODO#17: sarif format integrates with GitHub Security tab
                format: 'sarif'
                output: 'trivy-results.sarif'
                # TODO#18: Report HIGH and CRITICAL only.
                # LOW/MEDIUM should NOT block a build because:
                # - They are often theoretical / hard to exploit in context
                # - Many have no available fix yet (especially in base OS packages)
                # - Blocking on LOW/MEDIUM creates alert fatigue and slows delivery
                # HIGH/CRITICAL represent real, actively-exploitable risk worth blocking for.
                severity: 'HIGH,CRITICAL'
                # TODO#19: Include unfixed CVEs in the report for visibility,
                # but don't block on them (continue-on-error handles that).
                # Hiding unfixed CVEs gives a false sense of security.
                ignore-unfixed: false

            # TODO#20: Upload Trivy SARIF to Security tab
            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21: Upload trivy results as workflow artifact
            - name: Upload Trivy results as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-results
                path: trivy-results.sarif